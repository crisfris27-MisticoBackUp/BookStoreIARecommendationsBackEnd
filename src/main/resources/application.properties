spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.config.import=optional:classpath:application-local.properties
spring.datasource.url=jdbc:mysql://localhost:3306/reactlibrarydatabase?useSSL=false&useUnicode=yes&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.data.rest.base-path=/api
spring.security.user.name=${APP_SECURITY_USER:admin}
spring.security.user.password=${APP_SECURITY_PASSWORD:}

# Local-only overrides (ignored by git): src/main/resources/application-local.properties
